<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codebee.store</title>

  <!-- Favicon -->
  <link rel="icon" href="TransparentLogoSmall.ico">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ✅ Font FIX -->
  <link href="https://fonts.googleapis.com/css2?family=Mohave:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="site.css">

  <!-- Your JS -->
  <script src="site.js" defer></script>
</head>

<body style="font-family: 'Mohave', sans-serif;">

<header class="border-bottom box-shadow p-3">
    <div class="container p-0">
        <nav class="navbar navbar-expand-md p-0">

            <div class="d-flex justify-content-between align-items-center w-100">
                <a class="navbar-brand" href="index.html">
                    <img src="images/logotyp.png" style="max-height: 50px;">
                </a>

                <button class="navbar-toggler d-md-none"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarMain">
                    <img src="icons/dots.png" style="width:24px;">
                </button>
            </div>

            <div class="collapse navbar-collapse justify-content-md-end mt-3 mt-md-0"
                 id="navbarMain">
                <div class="d-flex flex-column flex-md-row align-items-center gap-3 gap-md-4">

                    <!-- ✅ fixed casing -->
                    <a class="btn navBtn" href="index.html">HOME</a>
                    <a class="btn navBtn" href="products.html">PRODUCTS</a>
                    <a class="btn navBtn text-nowrap" href="aboutus.html">ABOUT US</a>

                </div>
            </div>
        </nav>
    </div>
</header>

<!-- HERO / LORE -->
<div class="w-100 d-flex align-items-center justify-content-center"
     style="background: url('images/background.png') center/cover no-repeat; min-height: 550px;">
    
    <div class="loreDiv container p-5 m-4">
        
        <p class="historyTitle text-center">LORE OF CODEBEE AB</p>
        
        <p class="historyText text-center">
            CodeBee was founded by a Swedish couple in late 2025.
        </p>

        <div class="d-flex justify-content-center align-items-center mt-5">
            <p class="historyText mb-0 me-3">Connect with us:</p>

            <a href="https://www.instagram.com/codebeeab">
                <img class="socialMediaIcon" src="icons/instagram.png" style="margin-right:20px;">
            </a>

            <a href="https://www.linkedin.com/company/codebee-ab">
                <img class="socialMediaIcon" src="icons/linkedin.png">
            </a>
        </div>

    </div>
</div>

<!-- TEAM -->
<div class="py-5 w-100 d-flex align-items-center justify-content-center"
     style="background-color:#383C48">

    <div class="container">
        <div class="row justify-content-evenly text-center">

            <div class="col-md-6 col-lg-4 mb-5">
                <img src="images/Maria.png" class="img-fluid rounded-circle" style="max-width:250px;">
                <p class="name mt-3">Maria Edström</p>
                <p class="jobTitle">CEO</p>

                <p class="jobTitle mb-2">Connect with Maria</p>
                <div class="d-flex justify-content-center gap-4">
                    <a href="#"><img class="socialMediaIcon" src="icons/instagram.png"></a>
                    <a href="#"><img class="socialMediaIcon" src="icons/linkedin.png"></a>
                    <a href="#"><img class="socialMediaIcon" src="icons/github.png"></a>
                </div>
            </div>

            <div class="col-md-6 col-lg-4 mb-5">
                <img src="images/Mattias.png" class="img-fluid rounded-circle" style="max-width:250px;">
                <p class="name mt-3">Mattias Johansson</p>
                <p class="jobTitle">Deputy CEO</p>
            </div>

        </div>
    </div>

</div>

<!-- FOOTER -->
<footer class="border-top p-3">

    <div class="container py-3">
        <div class="row">

            <div class="col-md-6">
                <p class="title">ABOUT US</p>
                <p>CodeBee was founded by a Swedish couple in 2025.</p>
            </div>

            <div class="col-md-3">
                <p class="title">FOLLOW US</p>
                <a href="https://www.instagram.com/codebeeab">
                    <img src="icons/instagram.png" width="25">
                </a>
                <a href="https://www.linkedin.com/company/codebee-ab">
                    <img src="icons/linkedin.png" width="25">
                </a>
            </div>

            <div class="col-md-3">
                <p class="title">CONTACT</p>
                <p>info@codebee.store</p>
            </div>

        </div>
    </div>

</footer>

<!-- ✅ Bootstrap JS LAST -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
